version: 1
frontend:
  phases:
    preBuild:
      commands:
        # Bake runtime env vars into .env.production so Next.js ships them
        # with the SSR Lambda artifact. Without this, Amplify branch env vars
        # are visible only to the build container, NOT to the SSR Lambda at
        # request time, and process.env.SES_API_KEY/etc. is undefined in prod.
        - env | grep -E '^(SES_|EMAIL_FROM|EMAIL_TO|NEXT_PUBLIC_)' >> .env.production || true
        - echo "--- .env.production keys ---" && cut -d= -f1 .env.production 2>/dev/null | sort -u
        - npm ci --cache .npm --prefer-offline
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .next/cache/**/*
      - .npm/**/*
