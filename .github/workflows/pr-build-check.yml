# Full Next.js build on seo-cron PRs so the human reviewer sees a green/red
# signal before merging the weekly auto-optimization PR. PR-only flow: nothing
# auto-merges — this is purely an advisory gate. Scoped to the fixed
# seo-cron/auto branch to avoid running on every PR.
name: PR build check

on:
  pull_request:
    branches: [main]

jobs:
  build:
    if: startsWith(github.head_ref, 'seo-cron/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npx tsc --noEmit
      - run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=4096
